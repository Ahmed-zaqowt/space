<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050814" />
  <title>Our Sky</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
   <div id="sky">

  <div class="sky-overlay"></div>

<div class="sun-or-moon" id="sunOrMoon">
  <span class="astro-halo"></span>
  <span class="astro-core"></span>
  <span class="astro-shadow"></span>

  <span class="moon-phase-label" id="moonPhaseLabel"></span>
</div>
<div class="quote-wrap">
  <div class="quote" id="quoteText"></div>
</div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="milky-way" id="milkyWay"></div>

  <!-- ⭐ النجوم -->
  <div class="stars-layer stars-back" id="starsBack"></div>
  <div class="stars-layer stars-mid" id="starsMid"></div>
  <div class="stars-layer stars-front" id="starsFront"></div>

  <div class="stardust-layer" id="stardustLayer"></div>

  <div class="cinematic-vignette"></div>

</div>
   
  

    <div class="memory-modal" id="memoryModal" aria-hidden="true">
      <div class="memory-modal-backdrop" id="closeModal"></div>

      <div class="memory-modal-card">
        <button class="close-btn" id="closeModalBtn">×</button>

        <div class="memory-head">
          <div class="memory-icon" id="memoryIcon">✦</div>
          <div>
            <div class="memory-kind" id="memoryKind">نجمة</div>
            <h2 class="memory-title" id="memoryTitle">عنوان</h2>
            <div class="memory-date" id="memoryDate">2026-06-18</div>
          </div>
        </div>

        <div class="memory-media" id="memoryMedia"></div>
        <p class="memory-text" id="memoryText"></p>

        <div class="memory-actions">
          <button class="btn btn-small" id="favoriteBtn">مفضلة</button>
          <button class="btn btn-small btn-ghost" id="closeModalBtn2">إغلاق</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
